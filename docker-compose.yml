services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docuchat
      POSTGRES_PASSWORD: docuchat_dev
      POSTGRES_DB: docuchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./services/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://docuchat:docuchat_dev@db:5432/docuchat
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/backend/app:/app/app
      - upload_data:/app/uploads

  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./services/frontend/src:/app/src

volumes:
  pgdata:
  upload_data:
